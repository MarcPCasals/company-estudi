name: Publica Company d'estudi

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descarrega el repositori
        uses: actions/checkout@v6

      - name: Configura Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Instal·la les dependències
        run: npm ci

      - name: Prepara la configuració pública de Firebase
        run: cp .env.example .env.production

      - name: Executa les proves
        run: npm test

      - name: Construeix l'aplicació
        run: npm run build

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepara els fitxers publicables
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publica a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
